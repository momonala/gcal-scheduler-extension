<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="utf-8">
    <title>gcal-scheduler</title>
    <style>
      .error { color: red; }
    </style>
  </head>
  <body>
    <form id="popup-form">
      <p>
        <label for="api-key">OpenAI API key</label>
        <input type="password" id="api-key" placeholder="sk-…" autocomplete="off">
      </p>
      <p>
        <label for="model">Model</label>
        <select id="model">
          <option value="">— Select model —</option>
        </select>
        <span id="model-status" aria-live="polite"></span>
      </p>
      <p>
        <label for="input">Event</label>
        <textarea id="input" rows="4" cols="32" placeholder="E.g. dinner friday 7pm"></textarea>
      </p>
      <p>
        <button type="submit" id="add">Add</button>
      </p>
      <div id="error" class="error" role="alert"></div>
    </form>
    <script type="module" src="popup.js"></script>
  </body>
</html>
